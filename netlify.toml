[build]
  command = "npm run build:full"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express", "cors", "nodemailer", "@supabase/supabase-js", "@google/genai", "serverless-http"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
